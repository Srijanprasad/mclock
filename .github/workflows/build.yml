name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: |
          if [ -f "Package.swift" ]; then
            swift package resolve
          elif [ -d "mclock.xcodeproj" ] || [ -d "mclock.xcworkspace" ]; then
            xcodebuild -resolvePackageDependencies \
              -scheme mclock \
              -clonedSourcePackagesDirPath .spm
          else
            echo "No Xcode project found yet — skipping dependency resolution"
          fi

      - name: Build Debug
        run: |
          if [ -d "mclock.xcodeproj" ] || [ -d "mclock.xcworkspace" ]; then
            xcodebuild build \
              -scheme mclock \
              -configuration Debug \
              -destination 'platform=macOS' \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty || exit ${PIPESTATUS[0]}
          else
            echo "::warning::Xcode project not found. Build will run once mclock.xcodeproj is added."
          fi

      - name: Build Release
        run: |
          if [ -d "mclock.xcodeproj" ] || [ -d "mclock.xcworkspace" ]; then
            xcodebuild build \
              -scheme mclock \
              -configuration Release \
              -destination 'platform=macOS' \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty || exit ${PIPESTATUS[0]}
          else
            echo "::warning::Xcode project not found. Release build skipped."
          fi

name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below to help us investigate.

  - type: dropdown
    id: version
    attributes:
      label: mclock Version
      description: Which version of mclock are you running?
      options:
        - v0.1.0
        - v0.2.0
        - v0.3.0
        - main (development)
        - Other
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      description: e.g., macOS 14.5 Sonoma
      placeholder: "macOS 14.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open mclock
        2. Click 'Lock' in menu bar
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Reports
      description: |
        Relevant log output or crash reports.
        Check Console.app → filter by "mclock".
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (app crash, data loss)
        - High (feature broken, no workaround)
        - Medium (feature broken, workaround exists)
        - Low (cosmetic, minor inconvenience)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
        - label: I am running a supported macOS version (14.0+)
          required: true

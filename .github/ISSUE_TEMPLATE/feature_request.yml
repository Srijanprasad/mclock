name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly so we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Menu Bar Clock
        - Lock Screen
        - Authentication
        - Theming
        - Settings
        - Plugins
        - Localization
        - Performance
        - Other
    validations:
      required: true

  - type: checkboxes
    id: extensibility
    attributes:
      label: Extensibility
      options:
        - label: This could be implemented as a plugin or provider (no core changes needed)
        - label: I would be willing to contribute this feature

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
        - label: This feature aligns with the project roadmap (see ROADMAP.md)
          required: true

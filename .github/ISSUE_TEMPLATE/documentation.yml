name: Documentation Issue
description: Report missing, incorrect, or unclear documentation
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve mclock documentation. Report missing, outdated, or unclear docs.

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      options:
        - README / Getting Started
        - API Documentation
        - Architecture Guide
        - Contributing Guide
        - Code Examples
        - FAQ
        - Release Notes / Changelog
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Document Location
      description: File path or URL of the documentation in question.
      placeholder: "docs/extensibility.md"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's Wrong?
      description: Describe what's missing, incorrect, or unclear.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
        - label: I would be willing to submit a PR to fix this
          required: false

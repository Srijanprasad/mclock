# SwiftLint configuration for mclock
# See: https://realm.github.io/SwiftLint/rule-directory.html

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

excluded:
  - .build
  - DerivedData
  - Carthage
  - Pods
  - .spm

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 80

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

custom_rules:
  no_print:
    name: "No print statements"
    regex: '(?<!//\s)(?<!\w)print\s*\('
    message: "Use os.Logger instead of print()"
    severity: warning

reporter: "xcode"
